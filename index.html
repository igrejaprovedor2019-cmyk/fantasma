        /* Camada para escurecer o fundo e destacar a logo */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;

        /* 2. LOGO CENTRALIZADA */
        .logo-box {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .logo-principal {
            width: 80%;
            max-width: 450px;
            height: auto;
            filter: drop-shadow(0px 0px 15px rgba(255, 255, 255, 0.2));
            animation: flutuar 3s ease-in-out infinite;
        }

        @keyframes flutuar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* 3. RESTO DO SITE (CONTEÚDO) */

            position: relative;
            z-index: 3;
            background: #0f0f0f;
            padding: 80px 20px;
            text-align: center;
        }

        .info-container {
            max-width: 900px;
            margin: 0 auto;

        .titulo-secao {
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #00d4ff; /* Cor de destaque */
        }

        .texto-org {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #ccc;
            margin-bottom: 40px;
        }

        /* BOTÕES DE REDES SOCIAIS / REGISTRO */
        .botoes-grupo {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 35px;
            text-decoration: none;
            color: white;
            border: 2px solid #00d4ff;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            border-radius: 5px;
        }

        .btn:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
        }

        footer {
            padding: 40px;
            text-align: center;
            font-size: 0.9rem;
            color: #555;
            background: #0a0a0a;
        }
