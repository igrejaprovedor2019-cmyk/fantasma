<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORG FANTASMA E-SPORT | OFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --dark-bg: #030712;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--dark-bg);
            color: #ffffff;
            overflow-x: hidden;
            margin: 0;
        }
        
        .font-gaming { font-family: 'Orbitron', sans-serif; }

        /* --- IMAGEM DE FUNDO (image_7429df.png) --- */
        .main-bg {
            background-image: url('image_7429df.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: fixed;
            inset: -20px; /* margem para o blur não comer as bordas */
            z-index: -2;
            filter: blur(10px) brightness(0.3); /* Desfoca e escurece o fundo */
            transform: scale(1.1);
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(3, 7, 18, 0.2) 0%, rgba(3, 7, 18, 0.8) 100%);
            z-index: -1;
        }

        /* --- LOGO NO CÍRCULO (fnt.webp) --- */
        .logo-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 4s ease-in-out infinite;
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: none !important; /* Mantém a logo central nítida */
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }

        .btn-neon {
            background: linear-gradient(90deg, #00c3ff, #0066ff);
            box-shadow: 0 0 20px rgba(0, 195, 255, 0.4);
            transition: all 0.3s ease;
        }

        .btn-neon:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(0, 242, 255, 0.7);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="main-bg"></div>
    <div class="bg-overlay"></div>

    <main class="relative z-10 w-full max-w-2xl flex flex-col items-center text-center">
        
        <div class="logo-circle mb-8">
            <img src="fnt.webp" alt="Logo Fantasma">
        </div>

        <h1 class="font-gaming text-4xl md:text-6xl font-black italic uppercase leading-none mb-6">
            ORG FANTASMA<br>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                E-SPORT / SALAS
            </span>
        </h1>

        <div class="glass-panel p-8 w-full space-y-6">
            <p class="text-gray-300 text-lg">
                Estrutura profissional e competitividade de elite.<br>
                Sua jornada para o topo começa aqui.
            </p>

            <div class="inline-block bg-black/50 border border-green-500/50 px-6 py-2 rounded-full">
                <span class="text-green-400 font-bold tracking-wider">
                    APOSTAS A PARTIR DE <span class="text-white text-xl">R$ 0,10</span>
                </span>
            </div>

            <div class="pt-4">
                <a href="https://discord.gg/T5y8JbBMS6" class="btn-neon inline-block px-10 py-4 rounded-xl text-xl font-black uppercase tracking-tighter text-white">
                    ENTRAR NO SERVIDOR
                </a>
            </div>
        </div>

        <div class="flex gap-6 mt-8 text-[10px] font-bold tracking-[0.2em] text-gray-400 uppercase">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                653 ONLINE
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                9.514 MEMBROS
            </div>
        </div>
    </main>

</body>
</html>
