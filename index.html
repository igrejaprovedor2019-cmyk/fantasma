<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORG FANTASMA E-SPORT | OFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --dark-bg: #030712;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--dark-bg);
            color: #ffffff;
            overflow-x: hidden;
            margin: 0;
        }
        
        .font-gaming { font-family: 'Orbitron', sans-serif; }

        /* --- NOVO FUNDO DESFOCADO (image_7429df.png) --- */
        .main-bg {
            background-image: url('image_7429df.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: fixed;
            inset: -15px; /* Compensação para o blur não mostrar bordas */
            z-index: -2;
            filter: blur(12px) brightness(0.25) saturate(1.2);
            transform: scale(1.05);
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(3, 7, 18, 0.4) 0%, rgba(3, 7, 18, 0.9) 100%);
            z-index: -1;
        }

        /* --- LOGO NÍTIDA NO CÍRCULO (fnt.webp) --- */
        .logo-container {
            position: relative;
            z-index: 10;
            margin-bottom: 2rem;
        }

        .logo-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid var(--neon-cyan);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.5);
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 4s ease-in-out infinite;
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: none !important; /* Garante que a logo fique 100% nítida */
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* --- ESTILOS DE INTERFACE --- */
        .glass-panel {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
        }

        .btn-neon {
            background: linear-gradient(90deg, #00c3ff, #0066ff);
            box-shadow: 0 0 20px rgba(0, 195, 255, 0.4);
            transition: all 0.3s ease;
        }

        .btn-neon:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(0, 242, 255, 0.6);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="main-bg"></div>
    <div class="bg-overlay"></div>

    <main class="relative z-10 w-full max-w-4xl flex flex-col items-center">
        
        <div class="logo-container">
            <div class="logo-circle">
                <img src="fnt.webp" alt="Logo Org Fantasma">
            </div>
        </div>

        <div class="text-center space-y-6">
            <h1 class="font-gaming text-5xl md:text-7xl font-black italic tracking-tighter uppercase">
                ORG FANTASMA<br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                    E-SPORT / SALAS
                </span>
            </h1>

            <section class="glass-panel p-8 md:p-10 space-y-8">
                <p class="text-slate-300 text-lg md:text-xl font-medium">
                    Estrutura profissional e competitividade de elite. <br>
                    Sua jornada para o topo começa aqui.
                </p>

                <div class="inline-block bg-black/40 border border-green-500/30 px-6 py-2 rounded-full">
                    <span class="text-green-400 font-bold text-xl uppercase">
                        Apostas a partir de <span class="text-white">R$ 0,10</span>
                    </span>
                </div>

                <div class="pt-4">
                    <a href="#" class="btn-neon inline-block px-12 py-5 rounded-xl text-xl font-black uppercase tracking-tighter text-white">
                        Entrar no Servidor
                    </a>
                </div>
            </section>

            <footer class="flex justify-center gap-8 text-xs font-bold tracking-widest text-slate-400 uppercase pt-6">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    653 ONLINE
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-cyan-500 rounded-full"></span>
                    9.514 MEMBROS
                </div>
            </footer>
        </div>
    </main>

</body>
</html>
