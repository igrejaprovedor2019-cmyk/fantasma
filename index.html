<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORG FANTASMA E-SPORT | OFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-blue: #0066ff;
            --dark-bg: #030712; /* Slate 950 */
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--dark-bg);
            color: #ffffff;
            overflow-x: hidden;
        }
        
        .font-gaming { font-family: 'Orbitron', sans-serif; }

        /* --- CONFIGURAÇÃO DO FUNDO DESFOCADO --- */
        .main-bg {
            /* Usando a PRIMEIRA imagem (emt8ah649e) */
            background-image: url('https://files.fm/f/emt8ah649e');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Efeito Parallax suave */
            position: fixed;
            inset: -10px; /* Pequeno overflow para não mostrar bordas brancas com o blur */
            z-index: -2;
            
            /* A MÁGICA DO DESFOCADO PROFISSIONAL */
            filter: blur(10px) saturate(1.3) brightness(0.2); 
            transform: scale(1.1); /* Compensa o inset para não distorcer */
        }

        /* Camada de sobreposição para garantir leitura e profundidade */
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(3, 7, 18, 0.2) 0%, rgba(3, 7, 18, 0.9) 100%);
            z-index: -1;
        }

        /* --- LOGO NO CÍRCULO (NORMAL) --- */
        .logo-container {
            position: relative;
            animation: float 5s ease-in-out infinite;
        }

        .logo-circle {
            width: 160px;
            height: 160px;
            @media (min-width: 768px) {
                width: 220px;
                height: 220px;
            }
            border-radius: 50%;
            border: 4px solid rgba(0, 242, 255, 0.4);
            box-shadow: 
                0 0 30px rgba(0, 242, 255, 0.3),
                inset 0 0 15px rgba(0, 242, 255, 0.2);
            overflow: hidden; /* Garante que a imagem fique dentro do círculo */
            background: #000; /* Fundo preto caso a imagem demore a carregar */
        }

        .logo-image {
            /* Usando a SEGUNDA imagem (ej58rhukk3) */
            src: url('https://files.fm/u/ej58rhukk3');
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ajusta a imagem sem distorcer */
            filter: none; /* Garante que ela fique NORMAL (sem desfoque) */
        }

        /* Efeito de brilho externo na logo */
        .logo-outer-glow {
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, rgba(0, 242, 255, 0) 70%);
            border-radius: 50%;
            filter: blur(10px);
            z-index: -1;
        }

        /* Animação de flutuação */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* --- OUTROS ESTILOS PREMIUM --- */
        .glass-panel {
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .text-glow {
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        .btn-neon {
            background: linear-gradient(90deg, #00c3ff, #0066ff);
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -10px rgba(0, 195, 255, 0.5);
        }

        .btn-neon:hover {
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.6);
            transform: translateY(-3px) scale(1.03);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="main-bg"></div>
    <div class="bg-overlay"></div>

    <main class="relative z-10 w-full max-w-5xl flex flex-col items-center">
        
        <div class="logo-container mb-12">
            <div class="logo-outer-glow"></div>
            <div class="logo-circle">
                <img src="https://files.fm/u/ej58rhukk3" alt="ORG FANTASMA LOGO" class="logo-image">
            </div>
        </div>

        <header class="text-center mb-12 space-y-3">
            <p class="text-cyan-400 font-bold tracking-[0.4em] uppercase text-xs md:text-sm text-glow">A Nova Era do E-Sport</p>
            <h1 class="font-gaming text-5xl md:text-8xl font-black italic tracking-tighter leading-none uppercase text-white">
                ORG FANTASMA<br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-white to-blue-600 drop-shadow-[0_0_15px_rgba(0,242,255,0.3)]">
                    E-SPORT / SALAS
                </span>
            </h1>
        </header>

        <section class="glass-panel p-8 md:p-12 rounded-[3rem] text-center w-full shadow-2xl space-y-12">
            
            <p class="text-slate-300 text-lg md:text-2xl font-medium leading-relaxed max-w-3xl mx-auto">
                Dominando o cenário com estrutura profissional, transparência e 
                <span class="text-white font-extrabold underline decoration-cyan-500 decoration-2">competitividade de elite</span>. 
                Sua jornada para o topo começa aqui.
            </p>

            <div class="space-y-5">
                <h2 class="text-3xl md:text-5xl font-extrabold tracking-tight text-white">
                    Sua habilidade vale ouro
                </h2>
                <div class="inline-block bg-green-950/30 border border-green-500/30 px-8 py-3 rounded-full shadow-[inset_0_0_20px_rgba(74,222,128,0.1)]">
                    <span class="text-green-400 text-2xl md:text-4xl font-black uppercase tracking-tight">
                        Apostas a partir de <span class="text-white">R$ 0,10</span>
                    </span>
                </div>
            </div>

            <div class="pt-6">
                <a href="https://discord.gg/T5y8JbBMS6" 
                   target="_blank" 
                   class="btn-neon inline-flex items-center justify-center px-16 py-7 rounded-2xl text-2xl md:text-3xl font-black uppercase tracking-widest text-white animate-pulse-slow">
                    <span class="relative flex items-center gap-4">
                        <img src="https://assets-global.website-files.com/6257adef93867e50d84d30e2/636e0a6918e51374013947a8_icon_clyde_white_RGB.svg" alt="Discord" class="w-9 h-9">
                        Entrar no Servidor
                    </span>
                </a>
            </div>

        </section>

        <footer class="mt-16 w-full max-w-2xl glass-panel py-4 px-8 rounded-full flex justify-around items-center text-slate-400 font-bold text-xs md:text-sm tracking-[0.2em] uppercase border border-white/5">
            <div class="flex items-center gap-3">
                <span class="relative flex h-3.5 w-3.5">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3.5 w-3.5 bg-green-500 shadow-[0_0_10px_#22c55e]"></span>
                </span>
                653 ONLINE
            </div>
            <div class="text-slate-700">|</div>
            <div class="text-white text-glow">9.514 MEMBROS</div>
        </footer>
    </main>

</body>
</html>
