<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORG FANTASMA E-SPORT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(6, 182, 212, 0.3); }
            50% { box-shadow: 0 0 40px rgba(6, 182, 212, 0.6); }
        }
        .animate-glow { animation: pulse-glow 3s infinite; }
        .bg-blur-logo {
            background-image: url('fnt.webp');
            filter: blur(15px) saturate(1.8) brightness(0.3);
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center overflow-x-hidden">

    <div class="absolute inset-0 z-0 bg-blur-logo bg-center bg-no-repeat bg-cover scale-110"></div>
    
    <div class="absolute inset-0 z-10 bg-gradient-to-b from-slate-950/50 via-slate-950/80 to-slate-950"></div>

    <main class="relative z-20 max-w-4xl w-full px-6 py-12 text-center flex flex-col items-center">
        
        <div class="mb-10 transform hover:scale-105 transition-transform duration-500">
            <img src="fnt.webp" alt="Fantasma Logo" class="w-40 h-40 rounded-full border-4 border-cyan-500 animate-glow object-cover">
        </div>

        <h1 class="text-4xl md:text-7xl font-black italic tracking-tighter mb-6 uppercase">
            Bem-vindo à <br>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">
                ORG FANTASMA E-SPORT / SALAS
            </span>
        </h1>

        <div class="bg-black/40 backdrop-blur-xl border border-white/10 p-6 rounded-3xl mb-10 max-w-2xl">
            <p class="text-slate-300 text-lg md:text-xl leading-relaxed">
                A elite do <span class="text-white font-bold">Free Fire Max</span> está aqui. 
                Nossa organização é focada em competitividade real e salas personalizadas 
                para quem busca o topo do cenário.
            </p>
        </div>

        <div class="space-y-8">
            <h2 class="text-2xl md:text-4xl font-bold">
                Comece apostando e ganhando dinheiro <br>
                <span class="text-green-400">a partir de 10 centavos!</span>
            </h2>

            <a href="https://discord.gg/SEU_LINK" target="_blank" 
               class="inline-flex items-center justify-center px-10 py-5 text-xl font-black uppercase tracking-widest text-white bg-green-600 hover:bg-green-500 rounded-full transition-all hover:scale-110 active:scale-95 shadow-[0_10px_30px_rgba(22,163,74,0.4)]">
                Ir para o Servidor
                <svg class="w-6 h-6 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                </svg>
            </a>
        </div>

        <div class="mt-16 flex items-center gap-4 text-slate-500 font-medium">
            <span class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                653 ONLINE
            </span>
            <span class="w-1 h-1 bg-slate-700 rounded-full"></span>
            <span>9.514 MEMBROS</span>
        </div>
    </main>

</body>
</html>
