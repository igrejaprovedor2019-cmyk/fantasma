<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORG FANTASMA - OFICIAL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'orbitron', sans-serif, Arial;
        }

        body {
            background-color: #050505;
            color: white;
            overflow-x: hidden;
        }

        /* CONTAINER PRINCIPAL COM O FUNDO DO FANTASMA */
        .hero {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: url('image_800d88.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* ESCURECE O FUNDO PARA O TEXTO APARECER */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
        }

        /* LOGO REDONDA COM BRILHO NEON */
        .logo-perfil {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 3px solid #00d4ff;
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.6);
            object-fit: cover;
            margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .highlight {
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .tagline {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* BOX DE APOSTAS E STATUS */
        .info-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            max-width: 450px;
            margin: 0 auto;
        }

        .btn-discord {
            display: inline-block;
            background: #007bff;
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 20px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }

        .btn-discord:hover {
            background: #0056b3;
            transform: scale(1.05);
        }

        .status-bar {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #00ff88;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="overlay"></div>

        <div class="content">
            <img src="fnt.webp" alt="Logo Fantasma" class="logo-perfil">
            
            <h1>ORG FANTASMA</h1>
            <h1 class="highlight">E-SPORT / SALAS</h1>
            <p class="tagline">A NOVA ERA DO E-SPORT COMEÇA AQUI</p>

            <div class="info-box">
                <p style="color: #ccc; margin-bottom: 15px;">Sua habilidade vale ouro</p>
                <p style="color: #00ff88; font-weight: bold; margin-bottom: 20px;">APOSTAS A PARTIR DE R$ 0,10</p>
                
                <a href="https://discord.com/invite/T5y8JbBMS6" class="btn-discord">
                    ENTRAR NO SERVIDOR
                </a>
            </div>

            <div class="status-bar">
                <span>● 653 ONLINE</span>
                <span>● 2.514 MEMBROS</span>
            </div>
        </div>
    </section>

</body>
</html>
