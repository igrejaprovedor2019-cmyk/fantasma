<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORG FANTASMA - OFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }

        /* FUNDO GERADO POR CÓDIGO (EFEITO NEON CYBER) */
        body, html {
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle at center, #001a1d 0%, #050505 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* EFEITO DE GRADE NO FUNDO */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            z-index: 1;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* CONTEÚDO CENTRAL */
        .main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 90%;
            max-width: 1000px;
        }

        /* LOGO CIRCULAR (Aqui você ainda precisa colocar o link da sua logo pequena) */
        .logo-wrapper {
            width: 220px;
            height: 220px;
            margin: 0 auto 30px;
            border-radius: 50%;
            border: 4px solid #00f2ff;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.4);
            overflow: hidden;
            background: #000;
            animation: pulseLogo 3s infinite ease-in-out;
        }

        @keyframes pulseLogo {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); }
            50% { box-shadow: 0 0 60px rgba(0, 242, 255, 0.8); }
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* TEXTOS GIGANTES */
        h1 {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            line-height: 1;
            margin-bottom: 10px;
            color: #fff;
        }

        .highlight {
            color: #00f2ff;
            font-size: 5.5rem;
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.8);
        }

        .descricao {
            font-size: 1.3rem;
            color: #888;
            margin-bottom: 40px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* CAIXA DE APOSTAS */
        .box-info {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #00f2ff;
            padding: 40px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .valor-aposta {
            color: #00ff88;
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        /* BOTÃO DO DISCORD */
        .btn-entrar {
            display: inline-block;
            background: #00f2ff;
            color: #000;
            text-decoration: none;
            padding: 20px 60px;
            border-radius: 5px;
            font-size: 1.6rem;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.4s;
        }

        .btn-entrar:hover {
            background: #fff;
            box-shadow: 0 0 50px #00f2ff;
            transform: translateY(-5px);
        }

        /* RODAPÉ */
        .footer-status {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 50px;
            font-size: 1.1rem;
        }

        .online { color: #00ff88; text-shadow: 0 0 5px #00ff88; }
        .membros { color: #00f2ff; text-shadow: 0 0 5px #00f2ff; }

    </style>
</head>
<body>

    <main class="main-container">
        
        <div class="logo-wrapper">
            <img src="fnt.webp" alt="Logo Org">
        </div>

        <h1>ORG FANTASMA</h1>
        <h1 class="highlight">E-SPORT / SALAS</h1>
        <p class="descricao">Dominando o cenário competitivo</p>

        <div class="box-info">
            <p style="margin-bottom: 10px; font-size: 1.1rem;">Sua habilidade vale ouro</p>
            <p class="valor-aposta">APOSTAS A PARTIR DE R$ 0,10</p>
            
            <a href="https://discord.com/invite/T5y8JbBMS6" target="_blank" class="btn-entrar">
                ENTRAR NO DISCORD
            </a>
        </div>

        <div class="footer-status">
            <span class="online">● 653 ONLINE</span>
            <span class="membros">● 2.514 MEMBROS</span>
        </div>

    </main>

</body>
</html>
